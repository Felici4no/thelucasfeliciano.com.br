<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Em Construção — Lucas Feliciano</title>
    <meta name="description" content="O site está sendo construído. Em breve, algo incrível estará aqui." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />

        <div class="socials">
            <a href="https://github.com/Felici4no" target="_blank" rel="noopener" class="social-btn" id="btn-github">
                <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">

            <div class="progress-track">

        </div>

        <p class="footer-note">© 2025 Lucas Feliciano · Todos os direitos reservados</p>
